<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>P/E Monitor</title>
<link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='icon.svg') }}">
<link rel="alternate icon" type="image/png" sizes="192x192" href="{{ url_for('static', filename='icon-192.png') }}">
<link rel="apple-touch-icon" href="{{ url_for('static', filename='icon-192.png') }}">
<link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}">
<meta name="theme-color" content="#0d6efd">
<script src="{{ url_for('static', filename='ag-grid-community.min.js') }}"></script>
<script src="{{ url_for('static', filename='chart.umd.js') }}"></script>
<style>
:root{
  --bg:#f8f9fa; --surface:#fff; --ink:#212529; --muted:#6c757d;
  --border:#dee2e6; --accent:#0d6efd; --accent-2:#dc3545; --dark:#343a40;
  --shadow:0 1px 4px rgba(0,0,0,.08); --radius:6px;
  --split:.5;        /* left-panel fraction of the two-column layout */
  --gutter:1.5rem;   /* draggable divider column width */
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:system-ui,-apple-system,sans-serif;
  margin:0;padding:0 1rem 3rem;
  background:var(--bg);color:var(--ink);
}
header{
  position:sticky;top:0;z-index:10;background:var(--bg);
  display:flex;align-items:center;justify-content:space-between;
  padding:1rem 0;border-bottom:1px solid var(--border);
}
header h1{font-size:1.3rem;margin:0;display:flex;align-items:baseline;gap:.5rem;flex-wrap:wrap}
header .meta{color:var(--muted);font-size:.8rem;font-weight:normal}
button{
  background:var(--dark);color:#fff;border:0;padding:.5rem 1rem;
  border-radius:4px;cursor:pointer;font-size:.85rem;transition:background .15s;
}
button:hover{background:#495057}
button:disabled{background:#adb5bd;cursor:wait}

.dashboard{display:grid;gap:2rem;margin:1.25rem 0;grid-template-columns:1fr}
.gutter{display:none}
@media (min-width:1280px){
  body{padding-bottom:0}
  /* Three columns: left | draggable gutter | right. The fixed-width gutter is
     subtracted first, then the remainder split by --split (set via drag). */
  .dashboard{
    grid-template-columns:
      calc((100% - var(--gutter)) * var(--split))
      var(--gutter)
      calc((100% - var(--gutter)) * (1 - var(--split)));
    gap:0;align-items:start;margin-bottom:0;
  }
  section.charts{max-height:calc(100vh - 6rem);overflow-y:auto}
  .gutter{
    display:flex;align-items:center;justify-content:center;
    align-self:stretch;cursor:col-resize;touch-action:none;
  }
  /* the visible grip line; grows + tints on hover/drag */
  .gutter::before{
    content:"";width:3px;height:36px;border-radius:2px;
    background:var(--border);transition:background .15s,height .15s;
  }
  .gutter:hover::before,.gutter.dragging::before{background:var(--accent);height:64px}
}
section.summary h2,section.charts h2{
  font-size:.78rem;color:var(--muted);margin:0 0 .5rem;
  text-transform:uppercase;letter-spacing:.5px;font-weight:600;
}

#summary-grid{box-shadow:var(--shadow);border-radius:var(--radius);overflow:hidden;height:calc(100vh - 8rem)}
#summary-grid .ag-row{cursor:pointer}
#summary-grid .ticker-cell{font-weight:600;color:var(--accent);font-family:ui-monospace,Menlo,monospace}
#summary-grid .cell-link{color:inherit;text-decoration:none}
#summary-grid .cell-link:hover{text-decoration:underline}
#summary-grid .ccy-native{color:var(--muted);font-size:.85em;margin-left:.25em}

.chart-card{
  background:var(--surface);padding:1rem 1.25rem;margin:1rem 0;
  border-radius:var(--radius);box-shadow:var(--shadow);
  scroll-margin-top:5rem;
}
.chart-card h3{font-size:1rem;margin:0 0 .5rem;display:flex;align-items:baseline;gap:.5rem;flex-wrap:wrap}
.chart-card h3 code{color:var(--accent);font-size:1.05rem}
.latest{color:var(--muted);font-size:.82rem;font-weight:normal;font-variant-numeric:tabular-nums}
.empty{color:#adb5bd;font-size:.85rem;padding:2rem 0;text-align:center}
.canvas-wrap{position:relative}
.canvas-wrap.pe-wrap{height:240px}
.canvas-wrap.vol-wrap{height:75px}
canvas{width:100%!important;height:100%!important}
.charts-toolbar{
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:.5rem;margin-bottom:.5rem;
}
.charts-toolbar h2{margin:0}
.range-selector{display:flex;gap:.2rem;flex-wrap:wrap}
.range-btn{
  background:transparent;color:var(--muted);border:1px solid var(--border);
  padding:.2rem .6rem;border-radius:4px;cursor:pointer;font-size:.72rem;
  font-weight:600;letter-spacing:.3px;
}
.range-btn:hover{background:var(--surface);color:var(--ink)}
.range-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
@keyframes flash{
  0%{box-shadow:0 0 0 3px var(--accent),var(--shadow)}
  100%{box-shadow:0 0 0 0 transparent,var(--shadow)}
}
.flash{animation:flash 1.4s ease-out}

.summary-toolbar{
  display:flex;align-items:center;justify-content:space-between;
  gap:.5rem;margin-bottom:.5rem;
}
.summary-toolbar h2{margin:0}
.col-chooser{position:relative}
.col-chooser-btn{
  background:transparent;color:var(--muted);border:1px solid var(--border);
  padding:.2rem .6rem;border-radius:4px;cursor:pointer;font-size:.72rem;
  font-weight:600;letter-spacing:.3px;
}
.col-chooser-btn:hover{background:var(--surface);color:var(--ink)}
.col-menu{
  position:absolute;right:0;top:calc(100% + 4px);z-index:20;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);box-shadow:var(--shadow);
  padding:.35rem;min-width:170px;display:none;
}
.col-menu.open{display:block}
.col-menu label{
  display:flex;align-items:center;gap:.5rem;padding:.3rem .45rem;
  font-size:.82rem;cursor:pointer;border-radius:4px;white-space:nowrap;
}
.col-menu label:hover{background:var(--bg)}
.col-menu input{cursor:pointer;margin:0}
.col-menu label.locked{opacity:.55;cursor:not-allowed}
</style>
</head>
<body>
<header id="top">
  <h1>P/E Monitor <span class="meta" id="meta"></span></h1>
  <button id="refresh-btn" onclick="refresh()">Refresh now</button>
</header>

<main class="dashboard">
<section class="summary">
  <div class="summary-toolbar">
    <h2>Snapshot</h2>
    <div class="col-chooser">
      <button type="button" class="col-chooser-btn" id="col-chooser-btn"
              aria-haspopup="true" aria-expanded="false">Columns ▾</button>
      <div class="col-menu" id="col-menu" role="menu"></div>
    </div>
  </div>
  <div id="summary-grid"></div>
</section>

<div class="gutter" id="panel-gutter" role="separator" aria-orientation="vertical"
     title="Drag to resize · double-click to reset"></div>

<section class="charts">
  <div class="charts-toolbar">
    <h2>History</h2>
    <div class="range-selector" id="range-selector">
      <button class="range-btn" data-range="1m">1M</button>
      <button class="range-btn" data-range="3m">3M</button>
      <button class="range-btn" data-range="6m">6M</button>
      <button class="range-btn" data-range="1y">1Y</button>
      <button class="range-btn" data-range="3y">3Y</button>
      <button class="range-btn" data-range="5y">5Y</button>
      <button class="range-btn active" data-range="all">All</button>
    </div>
  </div>
  <p id="history-placeholder" class="empty">Check one or more tickers above to view their historical chart.</p>
  {% for t in tickers %}
  <div class="chart-card" id="chart-card-{{ t }}" style="display:none">
    <h3><code>{{ t }}</code><span class="latest" id="latest-{{ t }}"></span></h3>
    <div class="canvas-wrap pe-wrap" id="container-{{ t }}"><canvas id="chart-{{ t }}"></canvas></div>
    <div class="canvas-wrap vol-wrap" id="vol-container-{{ t }}"><canvas id="chart-vol-{{ t }}"></canvas></div>
  </div>
  {% endfor %}
</section>
</main>

<script>
const tickers = {{ tickers | tojson }};
const FIRST_LIVE_DATE = {{ first_live_collection_date | tojson }};
const CURRENCY_SYMBOLS = {USD:"$",HKD:"HK$",EUR:"€",GBP:"£",CNY:"¥",JPY:"¥",TWD:"NT$",KRW:"₩"};
const fmt = v => (v == null ? "N/A" : Number(v).toFixed(2));
const fmtInt = v => (v == null ? "N/A" : String(Math.round(Number(v))));
const fmtPrice = (price, currency) => {
  if (price == null) return "N/A";
  const sym = CURRENCY_SYMBOLS[currency] || (currency ? currency + " " : "$");
  return `${sym}${Number(price).toLocaleString("en-US", {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
};
const fmtVolume = v => {
  if (v == null) return "N/A";
  v = Number(v);
  if (v >= 1e12) return (v/1e12).toFixed(2) + "T";
  if (v >= 1e9)  return (v/1e9).toFixed(2)  + "B";
  if (v >= 1e6)  return (v/1e6).toFixed(2)  + "M";
  if (v >= 1e3)  return (v/1e3).toFixed(1)  + "K";
  return String(Math.round(v));
};
// Compact form for axis ticks: "150M" / "1.5B" — no trailing zeros, fits a
// narrow gutter. The verbose `fmtVolume` is still used in the header and
// tooltip where precision is useful.
const fmtVolumeAxis = v => {
  if (v == null) return "";
  v = Number(v);
  if (v === 0) return "0";
  const trim = n => (Number.isInteger(n) ? String(n) : n.toFixed(1).replace(/\.0$/, ""));
  if (v >= 1e12) return trim(v/1e12) + "T";
  if (v >= 1e9)  return trim(v/1e9)  + "B";
  if (v >= 1e6)  return trim(v/1e6)  + "M";
  if (v >= 1e3)  return trim(v/1e3)  + "K";
  return String(Math.round(v));
};
const Y_AXIS_WIDTH = 58;  // pin both charts so date axes line up

// Dashed vertical marker at `first_live_collection_date`. Anything left of
// the line was backfilled (Wayback for fwd P/E, yfinance for everything
// else); anything to the right is from live daily snapshots.
//
// The x-axis is categorical (one slot per data row), so we find the first
// row >= cutoff and interpolate between it and the prior row by real-date
// proportion. That way the line lands in the visually-correct gap even
// when no row exactly matches the cutoff date.
const cutoffLinePlugin = {
  id: "cutoffLine",
  afterDatasetsDraw(chart, _args, opts) {
    const cutoff = opts.date;
    if (!cutoff) return;
    const labels = chart.data.labels;
    if (!labels || !labels.length) return;
    const idx = labels.findIndex(l => l >= cutoff);
    if (idx === -1) return;  // cutoff is past the end — nothing to draw

    const xScale = chart.scales.x;
    let xPixel;
    if (idx === 0) {
      xPixel = xScale.getPixelForValue(labels[0]);
    } else {
      const prevTime = Date.parse(labels[idx - 1]);
      const nextTime = Date.parse(labels[idx]);
      const cutTime = Date.parse(cutoff);
      const prevX = xScale.getPixelForValue(labels[idx - 1]);
      const nextX = xScale.getPixelForValue(labels[idx]);
      const t = (cutTime - prevTime) / (nextTime - prevTime);
      xPixel = prevX + (nextX - prevX) * t;
    }

    const {top, bottom} = chart.chartArea;
    const ctx = chart.ctx;
    ctx.save();
    ctx.strokeStyle = "rgba(108, 117, 125, 0.7)";
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 3]);
    ctx.beginPath();
    ctx.moveTo(xPixel, top);
    ctx.lineTo(xPixel, bottom);
    ctx.stroke();
    ctx.restore();
  },
};
Chart.register(cutoffLinePlugin);

let gridApi;
const visibleCharts = new Set();
const chartInstances = new Map();

const Y = {
  quote:    t => `https://finance.yahoo.com/quote/${encodeURIComponent(t)}/`,
  stats:    t => `https://finance.yahoo.com/quote/${encodeURIComponent(t)}/key-statistics/`,
  analysis: t => `https://finance.yahoo.com/quote/${encodeURIComponent(t)}/analysis/`,
};

const escapeHtml = s => String(s).replace(/[&<>"']/g, c =>
  ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

function linkCell(text, url) {
  if (text == null || text === "" || text === "N/A" || text === "—") return text || "";
  return `<a href="${url}" target="_blank" rel="noopener" class="cell-link">${text}</a>`;
}

const COLUMN_DEFS = [
  {field: "ticker", headerName: "Ticker", width: 140, pinned: "left", cellClass: "ticker-cell",
    cellRenderer: p => `<a href="${Y.quote(p.value)}" target="_blank" rel="noopener" class="cell-link">${p.value}</a>`},
  {field: "name", headerName: "Company", flex: 2,
    cellRenderer: p => p.value
      ? `<a href="${Y.quote(p.data.ticker)}" target="_blank" rel="noopener" class="cell-link">${escapeHtml(p.value)}</a>`
      : "—"},
  {field: "price", headerName: "Price", type: "numericColumn", flex: 1.2,
    cellRenderer: p => linkCell(fmtPrice(p.data.price, p.data.currency), Y.quote(p.data.ticker))},
  {field: "trailing_eps", headerName: "TTM EPS", type: "numericColumn", flex: 1,
    cellRenderer: p => linkCell(fmt(p.value), Y.stats(p.data.ticker))},
  {field: "ttm_pe", headerName: "TTM P/E", type: "numericColumn", flex: 1,
    cellRenderer: p => linkCell(fmt(p.value), Y.stats(p.data.ticker))},
  {field: "forward_eps", headerName: "Fwd EPS", type: "numericColumn", flex: 1.4,
    cellRenderer: p => {
      const main = fmt(p.value);
      const native = p.data.forward_eps_native;
      const fc = p.data.financial_currency, tc = p.data.currency;
      if (main !== "N/A" && native != null && fc && fc !== tc) {
        const sym = CURRENCY_SYMBOLS[fc] || (fc + " ");
        return linkCell(`${main} <span class="ccy-native">(${sym}${Number(native).toFixed(2)})</span>`,
                        Y.analysis(p.data.ticker));
      }
      return linkCell(main, Y.analysis(p.data.ticker));
    }},
  {field: "analyst_count", headerName: "Anlst", type: "numericColumn", flex: 0.7,
    cellRenderer: p => linkCell(fmtInt(p.value), Y.analysis(p.data.ticker))},
  {field: "forward_pe", headerName: "Fwd P/E", type: "numericColumn", flex: 1,
    cellRenderer: p => linkCell(fmt(p.value), Y.analysis(p.data.ticker)), sort: "asc"},
];

// Per-browser column visibility. We persist the *hidden* set (rather than the
// visible one) so columns added to COLUMN_DEFS later default to shown. The
// ticker column is locked on — it carries the row-selection checkboxes.
const COLS_KEY = "pe-hidden-cols";
const LOCKED_COLS = new Set(["ticker"]);

function loadHiddenCols() {
  try { return new Set(JSON.parse(localStorage.getItem(COLS_KEY)) || []); }
  catch { return new Set(); }
}
function saveHiddenCols(set) {
  localStorage.setItem(COLS_KEY, JSON.stringify([...set]));
}

function applyColumnVisibility() {
  const hidden = loadHiddenCols();
  for (const def of COLUMN_DEFS) {
    const visible = LOCKED_COLS.has(def.field) || !hidden.has(def.field);
    gridApi.setColumnsVisible([def.field], visible);
  }
}

function buildColumnChooser() {
  const menu = document.getElementById("col-menu");
  const hidden = loadHiddenCols();
  menu.innerHTML = "";
  for (const def of COLUMN_DEFS) {
    const locked = LOCKED_COLS.has(def.field);
    const label = document.createElement("label");
    if (locked) label.classList.add("locked");
    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.checked = locked || !hidden.has(def.field);
    cb.disabled = locked;
    cb.addEventListener("change", () => {
      const h = loadHiddenCols();
      if (cb.checked) h.delete(def.field); else h.add(def.field);
      saveHiddenCols(h);
      gridApi.setColumnsVisible([def.field], cb.checked);
    });
    label.append(cb, document.createTextNode(def.headerName));
    menu.appendChild(label);
  }
}

function initColumnChooser() {
  const btn = document.getElementById("col-chooser-btn");
  const menu = document.getElementById("col-menu");
  if (!btn || !menu) return;
  btn.addEventListener("click", e => {
    e.stopPropagation();
    const open = menu.classList.toggle("open");
    btn.setAttribute("aria-expanded", String(open));
  });
  // Close on outside click; keep open when interacting with the menu itself.
  menu.addEventListener("click", e => e.stopPropagation());
  document.addEventListener("click", () => {
    menu.classList.remove("open");
    btn.setAttribute("aria-expanded", "false");
  });
}

function updateHistoryPlaceholder() {
  const ph = document.getElementById("history-placeholder");
  if (ph) ph.style.display = visibleCharts.size === 0 ? "" : "none";
}

function showChart(ticker) {
  const card = document.getElementById(`chart-card-${ticker}`);
  if (!card) return;
  card.style.display = "";
  visibleCharts.add(ticker);
  loadChart(ticker);
}

function destroyCharts(ticker) {
  const inst = chartInstances.get(ticker);
  if (!inst) return;
  inst.pe?.destroy();
  inst.vol?.destroy();
  chartInstances.delete(ticker);
}

function hideChart(ticker) {
  const card = document.getElementById(`chart-card-${ticker}`);
  if (!card) return;
  card.style.display = "none";
  destroyCharts(ticker);
  visibleCharts.delete(ticker);
}

function onSelectionChanged() {
  const selected = new Set(gridApi.getSelectedRows().map(r => r.ticker));
  let newlyAdded = null;
  for (const t of selected) {
    if (!visibleCharts.has(t)) { showChart(t); newlyAdded = t; }
  }
  for (const t of [...visibleCharts]) {
    if (!selected.has(t)) hideChart(t);
  }
  updateHistoryPlaceholder();
  if (newlyAdded) {
    requestAnimationFrame(() => {
      const card = document.getElementById(`chart-card-${newlyAdded}`);
      if (!card) return;
      card.scrollIntoView({behavior: "smooth", block: "start"});
      card.classList.remove("flash");
      void card.offsetWidth;
      card.classList.add("flash");
    });
  }
}

function ensureGrid() {
  if (gridApi) return;
  agGrid.ModuleRegistry.registerModules([agGrid.AllCommunityModule]);
  gridApi = agGrid.createGrid(document.getElementById("summary-grid"), {
    theme: agGrid.themeQuartz.withParams({rowHeight: 32, headerHeight: 36}),
    columnDefs: COLUMN_DEFS,
    rowData: [],
    domLayout: "normal",
    defaultColDef: {resizable: true, sortable: true, filter: true},
    rowSelection: {
      mode: "multiRow",
      checkboxes: true,
      headerCheckbox: false,
      enableClickSelection: false,
    },
    getRowId: ({data}) => data.ticker,
    onSelectionChanged,
  });
  applyColumnVisibility();
  buildColumnChooser();
}

async function loadSnapshot() {
  const res = await fetch("/api/latest");
  const data = await res.json();
  ensureGrid();
  gridApi.setGridOption("rowData", data);
  const dates = data.map(r => r.date).filter(Boolean).sort();
  const latest = dates[dates.length - 1] || "no data yet";
  document.getElementById("meta").textContent = `· ${tickers.length} tickers · last updated ${latest}`;
}

let currentRange = "all";

function setRange(range) {
  if (range === currentRange) return;
  currentRange = range;
  document.querySelectorAll(".range-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.range === range);
  });
  for (const t of visibleCharts) loadChart(t);
}

async function loadChart(ticker) {
  const res = await fetch(`/api/history/${ticker}?range=${currentRange}`);
  const rows = await res.json();
  const peContainer = document.getElementById(`container-${ticker}`);
  const volContainer = document.getElementById(`vol-container-${ticker}`);
  const latestEl = document.getElementById(`latest-${ticker}`);

  destroyCharts(ticker);

  if (!rows.length) {
    peContainer.innerHTML = '<div class="empty">No data yet — first snapshot will appear after the next crawl.</div>';
    volContainer.innerHTML = "";
    latestEl.textContent = "";
    return;
  }
  const last = rows[rows.length - 1];
  latestEl.textContent =
    `${last.name || ""} · ${fmtPrice(last.price, last.currency)} · ` +
    `TTM ${fmt(last.ttm_pe)} · Fwd ${fmt(last.forward_pe)} · ` +
    `Vol ${fmtVolume(last.volume)} · ${last.date}`;

  peContainer.innerHTML = `<canvas id="chart-${ticker}"></canvas>`;
  volContainer.innerHTML = `<canvas id="chart-vol-${ticker}"></canvas>`;
  const peCtx = document.getElementById(`chart-${ticker}`);
  const volCtx = document.getElementById(`chart-vol-${ticker}`);

  const labels = rows.map(r => r.date);
  const pinWidth = axis => { axis.width = Y_AXIS_WIDTH; };
  const lineStyle = {tension: 0.2, spanGaps: true, borderWidth: 1.5, pointRadius: 1.5, pointHoverRadius: 4};

  // Forward P/E rows between Wayback anchors are server-side interpolated
  // from implied EPS + daily price. We hide point markers on interpolated
  // segments so real anchors stand out as dots; the line itself stays
  // continuous so the trend reads cleanly.
  const fwdPeInterpRadius = rows.map(r => r.forward_pe_interpolated ? 0 : 1.5);
  const fwdPeInterpHover  = rows.map(r => r.forward_pe_interpolated ? 0 : 4);

  // IBES forward P/E: monthly anchors (PRICE/MEANEST from IBES) interpolated
  // to daily the same way. Markers only on real anchor months, so the IBES
  // dots read as a sanity check against the yfinance line between them.
  const ibesInterpRadius = rows.map(r => r.forward_pe_ibes_interpolated ? 0 : 2);
  const ibesInterpHover  = rows.map(r => r.forward_pe_ibes_interpolated ? 0 : 4);

  const peChart = new Chart(peCtx, {
    type: "line",
    data: {
      labels,
      datasets: [
        {label: "TTM P/E", data: rows.map(r => r.ttm_pe), borderColor: "#0d6efd", backgroundColor: "#0d6efd", ...lineStyle},
        {label: "Forward P/E", data: rows.map(r => r.forward_pe), borderColor: "#dc3545", backgroundColor: "#dc3545", ...lineStyle,
         pointRadius: fwdPeInterpRadius, pointHoverRadius: fwdPeInterpHover},
        {label: "Forward P/E (IBES)", data: rows.map(r => r.forward_pe_ibes), borderColor: "#198754", backgroundColor: "#198754", ...lineStyle,
         borderDash: [5, 3], pointRadius: ibesInterpRadius, pointHoverRadius: ibesInterpHover},
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: {mode: "index", intersect: false},
      scales: {
        y: {beginAtZero: false, afterFit: pinWidth},
        x: {ticks: {display: false}, grid: {display: false}},
      },
      plugins: {cutoffLine: {date: FIRST_LIVE_DATE}},
    },
  });

  const volChart = new Chart(volCtx, {
    type: "bar",
    data: {
      labels,
      datasets: [{
        label: "Volume",
        data: rows.map(r => r.volume),
        backgroundColor: "rgba(108, 117, 125, 0.55)",
        borderWidth: 0,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: {mode: "index", intersect: false},
      plugins: {
        legend: {display: false},
        tooltip: {callbacks: {label: c => `Volume: ${fmtVolume(c.parsed.y)}`}},
        cutoffLine: {date: FIRST_LIVE_DATE},
      },
      scales: {
        y: {
          beginAtZero: true,
          afterFit: pinWidth,
          ticks: {callback: fmtVolumeAxis, maxTicksLimit: 3},
        },
        x: {ticks: {maxRotation: 0, autoSkip: true, maxTicksLimit: 8}},
      },
    },
  });

  chartInstances.set(ticker, {pe: peChart, vol: volChart});
}

async function refresh() {
  const btn = document.getElementById("refresh-btn");
  btn.disabled = true;
  btn.textContent = "Fetching…";
  try {
    await fetch("/api/refresh", {method: "POST"});
    await loadSnapshot();
    for (const t of visibleCharts) await loadChart(t);
  } finally {
    btn.disabled = false;
    btn.textContent = "Refresh now";
  }
}

// Draggable divider between the snapshot grid (left) and charts (right).
// Adjusts --split (left-panel fraction of the row) and persists it, so the
// layout can be tuned to the monitor. Only active in the ≥1280px two-column
// layout; below that the panels stack and the gutter is hidden.
const SPLIT_KEY = "pe-panel-split";
const MIN_SPLIT = 0.2, MAX_SPLIT = 0.8;

function reflowCharts() {
  for (const inst of chartInstances.values()) { inst.pe?.resize(); inst.vol?.resize(); }
}

function setSplit(frac, persist) {
  frac = Math.min(MAX_SPLIT, Math.max(MIN_SPLIT, frac));
  document.documentElement.style.setProperty("--split", frac);
  if (persist) localStorage.setItem(SPLIT_KEY, String(frac));
  return frac;
}

function initPanelSplitter() {
  const gutter = document.getElementById("panel-gutter");
  const dash = document.querySelector(".dashboard");
  if (!gutter || !dash) return;

  const saved = parseFloat(localStorage.getItem(SPLIT_KEY));
  if (!Number.isNaN(saved)) setSplit(saved, false);

  let dragging = false;
  const onMove = e => {
    if (!dragging) return;
    const rect = dash.getBoundingClientRect();
    const usable = rect.width - gutter.offsetWidth;
    if (usable > 0) setSplit((e.clientX - rect.left) / usable, false);
  };
  const onUp = () => {
    if (!dragging) return;
    dragging = false;
    gutter.classList.remove("dragging");
    document.body.style.userSelect = "";
    const frac = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--split"));
    localStorage.setItem(SPLIT_KEY, String(frac));
    reflowCharts();
    window.removeEventListener("pointermove", onMove);
    window.removeEventListener("pointerup", onUp);
  };
  gutter.addEventListener("pointerdown", e => {
    dragging = true;
    gutter.classList.add("dragging");
    document.body.style.userSelect = "none";  // don't select text mid-drag
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
    e.preventDefault();
  });
  gutter.addEventListener("dblclick", () => { setSplit(0.5, true); reflowCharts(); });
}

(async () => {
  document.querySelectorAll(".range-btn").forEach(btn => {
    btn.addEventListener("click", () => setRange(btn.dataset.range));
  });
  initPanelSplitter();
  initColumnChooser();
  updateHistoryPlaceholder();
  await loadSnapshot();
})();
</script>
