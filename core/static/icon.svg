<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Gambler's Toolbox">
  <rect width="512" height="512" fill="#0f172a"/>
  <circle cx="256" cy="256" r="170" fill="#d11f2d"/>
  <!-- rim spots: thick dashed white ring near the edge -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="#f8fafc" stroke-width="46"
          stroke-dasharray="63 94" stroke-dashoffset="31.5"/>
  <!-- cover the inner half so only the rim spots remain -->
  <circle cx="256" cy="256" r="132" fill="#d11f2d"/>
  <!-- inner ring -->
  <circle cx="256" cy="256" r="122" fill="none" stroke="#f8fafc" stroke-width="9"/>
  <!-- spade -->
  <g fill="#f8fafc">
    <polygon points="256,188 167,272 345,272"/>
    <circle cx="214" cy="272" r="48"/>
    <circle cx="298" cy="272" r="48"/>
    <polygon points="244,300 268,300 290,344 222,344"/>
  </g>
</svg>
