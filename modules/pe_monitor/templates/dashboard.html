<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>P/E Monitor</title>
<link rel="icon" type="image/svg+xml" href="{{ url_for('pe_monitor_static', path='icon.svg') }}">
<link rel="alternate icon" type="image/png" sizes="192x192" href="{{ url_for('pe_monitor_static', path='icon-192.png') }}">
<link rel="apple-touch-icon" href="{{ url_for('pe_monitor_static', path='icon-192.png') }}">
<link rel="manifest" href="{{ url_for('pe_monitor_static', path='manifest.webmanifest') }}">
<meta name="theme-color" content="#000000">
<link rel="stylesheet" href="/static/terminal.css">
<script src="{{ url_for('pe_monitor_static', path='ag-grid-community.min.js') }}"></script>
<script src="{{ url_for('pe_monitor_static', path='chart.umd.js') }}"></script>
<script src="{{ url_for('pe_monitor_static', path='grid-prefs.js') }}"></script>
<style>
:root{
  /* colours come from terminal.css; only the layout vars are page-local */
  --split:.5;        /* left-panel fraction of the two-column layout */
  --gutter:1.5rem;   /* draggable divider column width */
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;padding:0 1rem 3rem;
  background:var(--bg);color:var(--ink);
}
header{
  position:sticky;top:0;z-index:10;background:var(--bg);
  display:flex;align-items:center;justify-content:space-between;
  padding:1rem 0;border-bottom:1px solid var(--border);
}
header h1{font-size:1.15rem;margin:0;display:flex;align-items:baseline;gap:.5rem;flex-wrap:wrap;color:var(--amber);letter-spacing:.04em}
header .meta{color:var(--muted);font-size:.8rem;font-weight:normal}
.header-actions{display:flex;align-items:center;gap:.75rem}

.dashboard{display:grid;gap:2rem;margin:1.25rem 0;grid-template-columns:1fr}
.gutter{display:none}
@media (min-width:1280px){
  body{padding-bottom:0}
  /* Three columns: left | draggable gutter | right. The fixed-width gutter is
     subtracted first, then the remainder split by --split (set via drag). */
  .dashboard{
    grid-template-columns:
      calc((100% - var(--gutter)) * var(--split))
      var(--gutter)
      calc((100% - var(--gutter)) * (1 - var(--split)));
    gap:0;align-items:start;margin-bottom:0;
  }
  section.charts{max-height:calc(100vh - 6rem);overflow-y:auto}
  .gutter{
    display:flex;align-items:center;justify-content:center;
    align-self:stretch;cursor:col-resize;touch-action:none;
  }
  /* the visible grip line; grows + tints on hover/drag */
  .gutter::before{
    content:"";width:3px;height:36px;border-radius:2px;
    background:var(--border);transition:background .15s,height .15s;
  }
  .gutter:hover::before,.gutter.dragging::before{background:var(--accent);height:64px}
}
section.summary h2,section.charts h2{
  font-size:.78rem;color:var(--muted);margin:0 0 .5rem;
  text-transform:uppercase;letter-spacing:.5px;font-weight:600;
}

#summary-grid{box-shadow:var(--shadow);border-radius:var(--radius);overflow:hidden;height:calc(100vh - 8rem)}
#summary-grid .ag-row{cursor:pointer}
#summary-grid .ticker-cell{font-weight:600;color:var(--accent);font-family:ui-monospace,Menlo,monospace}
#summary-grid .cell-link{color:inherit;text-decoration:none}
#summary-grid .cell-link:hover{text-decoration:underline}
#summary-grid .ccy-native{color:var(--muted);font-size:.85em;margin-left:.25em}
#summary-grid .crawl-fresh{color:#2ecc71;font-weight:600}
#summary-grid .crawl-warn{color:#ffd23f;font-weight:600}
#summary-grid .crawl-stale{color:#ff5252;font-weight:600}

.chart-card{
  background:var(--surface);padding:1rem 1.25rem;margin:1rem 0;
  border-radius:var(--radius);box-shadow:var(--shadow);
  scroll-margin-top:5rem;
}
.chart-card h3{font-size:1rem;margin:0 0 .5rem;display:flex;align-items:baseline;gap:.5rem;flex-wrap:wrap}
.chart-card h3 code{color:var(--accent);font-size:1.05rem}
.latest{color:var(--muted);font-size:.82rem;font-weight:normal;font-variant-numeric:tabular-nums}
.empty{color:#adb5bd;font-size:.85rem;padding:2rem 0;text-align:center}
.canvas-wrap{position:relative}
.canvas-wrap.price-wrap{height:240px}
.canvas-wrap.pe-wrap{height:240px}
.canvas-wrap.vol-wrap{height:75px}
canvas{width:100%!important;height:100%!important}
.charts-toolbar{
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:.5rem;margin-bottom:.5rem;
}
.charts-toolbar h2{margin:0}
.range-selector{display:flex;gap:.2rem;flex-wrap:wrap}
.range-btn{
  background:transparent;color:var(--muted);border:1px solid var(--border);
  padding:.2rem .6rem;border-radius:4px;cursor:pointer;font-size:.72rem;
  font-weight:600;letter-spacing:.3px;
}
.range-btn:hover{background:var(--surface);color:var(--ink)}
.range-btn.active{background:var(--accent);color:#000;border-color:var(--accent)}
.series-legend{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:.3rem 0 .6rem}
.series-chip{display:inline-flex;align-items:center;gap:6px;cursor:pointer;user-select:none;
  font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink);
  border:1px solid var(--border);padding:2px 8px}
.series-chip .swatch{width:14px;height:3px;display:inline-block}
.series-chip:hover{border-color:var(--border-strong)}
.series-chip.off{opacity:.45;text-decoration:line-through}
.panel-toggle{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:.3rem 0 .2rem}
.panel-toggle .lbl{font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)}
.charts.hide-price .price-wrap,.charts.hide-pe .pe-wrap,.charts.hide-vol .vol-wrap{display:none}
.chart-controls{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.date-range{display:flex;align-items:center;gap:.3rem}
.date-range input[type=date]{
  font-family:inherit;font-size:.72rem;color:var(--ink);background:var(--surface);
  border:1px solid var(--border);border-radius:4px;padding:.16rem .4rem;
}
.date-range input[type=date]:focus{outline:none;border-color:var(--accent)}
.date-sep{color:var(--muted);font-size:.8rem}
@keyframes flash{
  0%{box-shadow:0 0 0 3px var(--accent),var(--shadow)}
  100%{box-shadow:0 0 0 0 transparent,var(--shadow)}
}
.flash{animation:flash 1.4s ease-out}

.summary-toolbar{
  display:flex;align-items:center;justify-content:space-between;
  gap:.5rem;margin-bottom:.5rem;
}
.summary-toolbar h2{margin:0}
.col-chooser{position:relative}
.col-chooser-btn{
  background:transparent;color:var(--muted);border:1px solid var(--border);
  padding:.2rem .6rem;border-radius:4px;cursor:pointer;font-size:.72rem;
  font-weight:600;letter-spacing:.3px;
}
.col-chooser-btn:hover{background:var(--surface);color:var(--ink)}
.col-menu{
  position:absolute;right:0;top:calc(100% + 4px);z-index:20;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);box-shadow:var(--shadow);
  padding:.35rem;min-width:170px;display:none;
}
.col-menu.open{display:block}
.col-menu label{
  display:flex;align-items:center;gap:.5rem;padding:.3rem .45rem;
  font-size:.82rem;cursor:pointer;border-radius:4px;white-space:nowrap;
}
.col-menu label:hover{background:var(--bg)}
.col-menu input{cursor:pointer;margin:0}
.col-menu label.locked{opacity:.55;cursor:not-allowed}
</style>
</head>
<body>
<header id="top">
  <h1>P/E Monitor <span class="meta" id="meta"></span></h1>
  <div class="header-actions">
    <a class="nav-link" href="{{ delta_url }}">Δ Fwd P/E →</a>
    <button id="refresh-btn" onclick="refresh()">Refresh now</button>
  </div>
</header>

<main class="dashboard">
<section class="summary">
  <div class="summary-toolbar">
    <h2>Snapshot</h2>
    <div class="col-chooser">
      <button type="button" class="col-chooser-btn" id="col-chooser-btn"
              aria-haspopup="true" aria-expanded="false">Columns ▾</button>
      <div class="col-menu" id="col-menu" role="menu"></div>
    </div>
  </div>
  <div id="summary-grid"></div>
</section>

<div class="gutter" id="panel-gutter" role="separator" aria-orientation="vertical"
     title="Drag to resize · double-click to reset"></div>

<section class="charts">
  <div class="charts-toolbar">
    <h2>History</h2>
    <div class="chart-controls">
      <div class="range-selector" id="range-selector">
        <button class="range-btn" data-range="1m">1M</button>
        <button class="range-btn" data-range="3m">3M</button>
        <button class="range-btn" data-range="6m">6M</button>
        <button class="range-btn" data-range="1y">1Y</button>
        <button class="range-btn" data-range="3y">3Y</button>
        <button class="range-btn" data-range="5y">5Y</button>
        <button class="range-btn" data-range="10y">10Y</button>
        <button class="range-btn active" data-range="all">All</button>
      </div>
      <div class="date-range" id="date-range">
        <input type="date" id="start-date" aria-label="Start date">
        <span class="date-sep">–</span>
        <input type="date" id="end-date" aria-label="End date">
      </div>
    </div>
  </div>
  <div class="panel-toggle" id="panel-toggle"></div>
  <div class="series-legend" id="series-legend"></div>
  <p id="history-placeholder" class="empty">Check one or more tickers above to view their historical chart.</p>
  {% for t in tickers %}
  <div class="chart-card" id="chart-card-{{ t }}" style="display:none">
    <h3><code>{{ t }}</code><span class="latest" id="latest-{{ t }}"></span></h3>
    <div class="canvas-wrap price-wrap" id="price-container-{{ t }}"><canvas id="chart-price-{{ t }}"></canvas></div>
    <div class="canvas-wrap pe-wrap" id="container-{{ t }}"><canvas id="chart-{{ t }}"></canvas></div>
    <div class="canvas-wrap vol-wrap" id="vol-container-{{ t }}"><canvas id="chart-vol-{{ t }}"></canvas></div>
  </div>
  {% endfor %}
</section>
</main>

<script>
const tickers = {{ tickers | tojson }};
const FIRST_LIVE_DATE = {{ first_live_collection_date | tojson }};
const CURRENCY_SYMBOLS = {USD:"$",HKD:"HK$",EUR:"€",GBP:"£",CNY:"¥",JPY:"¥",TWD:"NT$",KRW:"₩"};
const fmt = v => (v == null ? "N/A" : Number(v).toFixed(2));
const fmtInt = v => (v == null ? "N/A" : String(Math.round(Number(v))));
const fmtPrice = (price, currency) => {
  if (price == null) return "N/A";
  const sym = CURRENCY_SYMBOLS[currency] || (currency ? currency + " " : "$");
  return `${sym}${Number(price).toLocaleString("en-US", {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
};
const fmtVolume = v => {
  if (v == null) return "N/A";
  v = Number(v);
  if (v >= 1e12) return (v/1e12).toFixed(2) + "T";
  if (v >= 1e9)  return (v/1e9).toFixed(2)  + "B";
  if (v >= 1e6)  return (v/1e6).toFixed(2)  + "M";
  if (v >= 1e3)  return (v/1e3).toFixed(1)  + "K";
  return String(Math.round(v));
};
// Compact form for axis ticks: "150M" / "1.5B" — no trailing zeros, fits a
// narrow gutter. The verbose `fmtVolume` is still used in the header and
// tooltip where precision is useful.
const fmtVolumeAxis = v => {
  if (v == null) return "";
  v = Number(v);
  if (v === 0) return "0";
  const trim = n => (Number.isInteger(n) ? String(n) : n.toFixed(1).replace(/\.0$/, ""));
  if (v >= 1e12) return trim(v/1e12) + "T";
  if (v >= 1e9)  return trim(v/1e9)  + "B";
  if (v >= 1e6)  return trim(v/1e6)  + "M";
  if (v >= 1e3)  return trim(v/1e3)  + "K";
  return String(Math.round(v));
};
const fmtRelativeTime = iso => {
  if (!iso) return "—";
  const t = Date.parse(iso);
  if (Number.isNaN(t)) return "—";
  let s = Math.max(0, Math.floor((Date.now() - t) / 1000));
  if (s < 60) return `${s}s ago`;
  const m = Math.floor(s / 60); if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60); if (h < 24) return `${h}h ago`;
  return `${Math.floor(h / 24)}d ago`;
};
const crawlAgeDays = iso => {
  const t = iso ? Date.parse(iso) : NaN;
  return Number.isNaN(t) ? null : (Date.now() - t) / 86400000;
};
const Y_AXIS_WIDTH = 58;  // pin both charts so date axes line up

// Dashed vertical marker at `first_live_collection_date`. Anything left of
// the line was backfilled (Wayback for fwd P/E, yfinance for everything
// else); anything to the right is from live daily snapshots.
//
// The x-axis is a linear time scale, so we map the cutoff date straight to a
// pixel and skip drawing when it falls outside the visible range.
const cutoffLinePlugin = {
  id: "cutoffLine",
  afterDatasetsDraw(chart, _args, opts) {
    const cutoff = opts.date;
    if (!cutoff) return;
    const xScale = chart.scales.x;
    const xPixel = xScale.getPixelForValue(Date.parse(cutoff));
    if (xPixel < xScale.left || xPixel > xScale.right) return;  // outside view

    const {top, bottom} = chart.chartArea;
    const ctx = chart.ctx;
    ctx.save();
    ctx.strokeStyle = "rgba(255, 158, 27, 0.55)";
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 3]);
    ctx.beginPath();
    ctx.moveTo(xPixel, top);
    ctx.lineTo(xPixel, bottom);
    ctx.stroke();
    ctx.restore();
  },
};
Chart.register(cutoffLinePlugin);

// Shade the stretches where a line is undefined because the company was
// loss-making (no meaningful P/E), tinted to match the line — so a missing line
// reads as "in a loss here", not a data glitch. Drawn behind the lines.
const lossBandsPlugin = {
  id: "lossBands",
  beforeDatasetsDraw(chart, _args, opts) {
    const bands = opts.bands;
    if (!bands || !bands.length) return;
    const x = chart.scales.x, {top, bottom} = chart.chartArea, ctx = chart.ctx;
    ctx.save();
    for (const b of bands) {
      const x0 = Math.max(x.getPixelForValue(b.from), x.left);
      const x1 = Math.min(x.getPixelForValue(b.to), x.right);
      if (x1 > x0) { ctx.fillStyle = b.color; ctx.fillRect(x0, top, x1 - x0, bottom - top); }
    }
    ctx.restore();
  },
};
Chart.register(lossBandsPlugin);

// Dark-theme Chart.js: light ticks/legend text, dim grid lines on the black canvas.
Chart.defaults.color = "#9aa3ad";
Chart.defaults.borderColor = "#232a32";
Chart.defaults.font.family = "'IBM Plex Mono', monospace";

// Bloomberg-style last-value tags: a colored chip per line pinned over the
// right-hand price axis at the line's latest value. Line chart only; chips that
// would overlap are nudged apart vertically.
const lastValueTagPlugin = {
  id: "lastValueTags",
  afterDatasetsDraw(chart) {
    if (chart.config.type !== "line") return;
    const {ctx, chartArea, scales} = chart;
    const yScale = scales.y;
    const tags = [];
    chart.data.datasets.forEach((ds, i) => {
      // isDatasetVisible — not meta.hidden, which is null on a freshly built chart,
      // so a persisted hidden:true series draws no ghost tag after a rebuild.
      if (!chart.isDatasetVisible(i)) return;
      // Latest point only: scanning back over a terminal loss/gap would pin a stale
      // pre-loss value to the axis as if it were the current P/E.
      const last = ds.data[ds.data.length - 1];
      const yv = (last && typeof last === "object") ? last.y : last;
      if (yv == null || !Number.isFinite(yv)) return;
      tags.push({y: yScale.getPixelForValue(yv), color: ds.borderColor, text: yv.toFixed(2), label: ds.label});
    });
    chart.$valueTagLabels = tags.map(t => t.label);  // exposed for the e2e regression test
    if (!tags.length) return;
    const H = 15;
    tags.sort((a, b) => a.y - b.y);
    for (let i = 1; i < tags.length; i++)
      if (tags[i].y - tags[i - 1].y < H) tags[i].y = tags[i - 1].y + H;
    ctx.save();
    ctx.font = "700 11px 'IBM Plex Mono', monospace";
    ctx.textBaseline = "middle";
    for (const t of tags) {
      const w = ctx.measureText(t.text).width + 8;
      const cy = Math.max(chartArea.top + H / 2, Math.min(chartArea.bottom - H / 2, t.y));
      ctx.fillStyle = t.color;
      ctx.fillRect(chartArea.right + 1, cy - H / 2, w, H);
      ctx.fillStyle = "#000";
      ctx.fillText(t.text, chartArea.right + 5, cy + 0.5);
    }
    ctx.restore();
  },
};
Chart.register(lastValueTagPlugin);

let gridApi;
const visibleCharts = new Set();
// Series the user struck via the legend; persisted so a range/ticker change
// (which rebuilds the charts) doesn't resurrect a hidden line.
const hiddenSeries = new Set(JSON.parse(localStorage.getItem("pe-hidden-series") || "[]"));
function saveHidden() { localStorage.setItem("pe-hidden-series", JSON.stringify([...hiddenSeries])); }

// One shared legend for every per-ticker chart (small multiples). Colors mirror
// the line datasets; clicking a chip toggles that series across all charts.
const PE_SERIES = [
  {label: "TTM P/E", color: "#ff9e1b"},
  {label: "Forward P/E", color: "#ff5252"},
  {label: "Forward P/E (IBES)", color: "#2ecc71"},
];
function renderSeriesLegend() {
  const el = document.getElementById("series-legend");
  if (!el) return;
  el.innerHTML = "";
  for (const s of PE_SERIES) {
    const chip = document.createElement("span");
    chip.className = "series-chip" + (hiddenSeries.has(s.label) ? " off" : "");
    chip.innerHTML = `<span class="swatch" style="background:${s.color}"></span>${s.label}`;
    chip.onclick = () => toggleSeries(s.label);
    el.appendChild(chip);
  }
}
function toggleSeries(label) {
  if (hiddenSeries.has(label)) hiddenSeries.delete(label); else hiddenSeries.add(label);
  saveHidden();
  for (const inst of chartInstances.values()) {
    const i = inst.pe.data.datasets.findIndex(d => d.label === label);
    if (i >= 0) { inst.pe.setDatasetVisibility(i, !hiddenSeries.has(label)); inst.pe.update(); }
  }
  renderSeriesLegend();
}

// Independent show/hide for each stacked panel (price / P/E / volume), applied as
// CSS classes on the section so new cards inherit it; persisted across reloads.
const PANELS = [{key: "price", label: "Price"}, {key: "pe", label: "P/E"}, {key: "vol", label: "Volume"}];
const hiddenPanels = new Set(JSON.parse(localStorage.getItem("pe-hidden-panels") || "[]"));
function applyPanelVisibility() {
  const sec = document.querySelector("section.charts");
  if (sec) for (const p of PANELS) sec.classList.toggle(`hide-${p.key}`, hiddenPanels.has(p.key));
}
function renderPanelToggle() {
  const el = document.getElementById("panel-toggle");
  if (!el) return;
  el.innerHTML = '<span class="lbl">Panels</span>';
  for (const p of PANELS) {
    const chip = document.createElement("span");
    chip.className = "series-chip" + (hiddenPanels.has(p.key) ? " off" : "");
    chip.textContent = p.label;
    chip.onclick = () => togglePanel(p.key);
    el.appendChild(chip);
  }
}
function togglePanel(key) {
  if (hiddenPanels.has(key)) hiddenPanels.delete(key); else hiddenPanels.add(key);
  localStorage.setItem("pe-hidden-panels", JSON.stringify([...hiddenPanels]));
  applyPanelVisibility();
  renderPanelToggle();
  reflowCharts();   // a panel revealed from display:none built at 0px; resize fixes it
}
const chartInstances = new Map();
const historyRows = new Map();   // ticker -> fetched rows for the current range

// All charts share one TIME x-axis spanning every selected ticker's date range, so
// equal calendar spans get equal width and stacked charts still line up. Each line
// plots its own {x: epoch-ms, y} points; a shorter-history name simply starts later.
function timeExtent() {
  let lo = Infinity, hi = -Infinity;
  for (const t of visibleCharts)
    for (const r of (historyRows.get(t) || [])) {
      const ms = Date.parse(r.date);
      if (ms < lo) lo = ms;
      if (ms > hi) hi = ms;
    }
  return [lo, hi];
}
const fmtDateAxis = ms => new Date(ms).toISOString().slice(0, 10);
// Even date ticks (round years / quarters) — a plain linear axis would place
// ticks at round numbers, i.e. arbitrary dates. Pick the finest step that keeps
// the count under `target`, aligned to year/quarter/month boundaries.
function niceDateTicks(min, max, target = 7) {
  const YR = 365.25 * 864e5, span = max - min;
  const stepsM = [1, 3, 6, 12, 24, 60, 120, 240, 600];
  const stepM = stepsM.find(s => span / (s / 12 * YR) <= target) || 600;
  const d = new Date(min);
  let y = d.getUTCFullYear(), m = 0;
  if (stepM >= 12) y = Math.floor(y / (stepM / 12)) * (stepM / 12);
  else m = Math.floor(d.getUTCMonth() / stepM) * stepM;
  const ticks = [];
  for (let t = Date.UTC(y, m, 1); t <= max; ) {
    if (t >= min) ticks.push({value: t});
    if (stepM >= 12) y += stepM / 12; else { m += stepM; if (m >= 12) { m = 0; y++; } }
    t = Date.UTC(y, m, 1);
  }
  return ticks;
}
const fmtDateTick = ms => {
  const d = new Date(ms);
  return d.getUTCMonth() === 0 ? String(d.getUTCFullYear())
    : d.getUTCFullYear() + "-" + String(d.getUTCMonth() + 1).padStart(2, "0");
};

const Y = {
  quote:    t => `https://finance.yahoo.com/quote/${encodeURIComponent(t)}/`,
  stats:    t => `https://finance.yahoo.com/quote/${encodeURIComponent(t)}/key-statistics/`,
  analysis: t => `https://finance.yahoo.com/quote/${encodeURIComponent(t)}/analysis/`,
};

const escapeHtml = s => String(s).replace(/[&<>"']/g, c =>
  ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

function linkCell(text, url) {
  if (text == null || text === "" || text === "N/A" || text === "—") return text || "";
  return `<a href="${url}" target="_blank" rel="noopener" class="cell-link">${text}</a>`;
}

const COLUMN_DEFS = [
  {field: "ticker", headerName: "Ticker", width: 140, pinned: "left", cellClass: "ticker-cell",
    cellRenderer: p => `<a href="${Y.quote(p.value)}" target="_blank" rel="noopener" class="cell-link">${p.value}</a>`},
  {field: "name", headerName: "Company", flex: 2,
    cellRenderer: p => p.value
      ? `<a href="${Y.quote(p.data.ticker)}" target="_blank" rel="noopener" class="cell-link">${escapeHtml(p.value)}</a>`
      : "—"},
  {field: "price", headerName: "Price", type: "numericColumn", flex: 1.2,
    cellRenderer: p => linkCell(fmtPrice(p.data.price, p.data.currency), Y.quote(p.data.ticker))},
  {field: "trailing_eps", headerName: "TTM EPS", type: "numericColumn", flex: 1,
    cellRenderer: p => linkCell(fmt(p.value), Y.stats(p.data.ticker))},
  {field: "ttm_pe", headerName: "TTM P/E", type: "numericColumn", flex: 1,
    cellRenderer: p => linkCell(fmt(p.value), Y.stats(p.data.ticker))},
  {field: "forward_eps", headerName: "Fwd EPS", type: "numericColumn", flex: 1.4,
    cellRenderer: p => {
      const main = fmt(p.value);
      const native = p.data.forward_eps_native;
      const fc = p.data.financial_currency, tc = p.data.currency;
      if (main !== "N/A" && native != null && fc && fc !== tc) {
        const sym = CURRENCY_SYMBOLS[fc] || (fc + " ");
        return linkCell(`${main} <span class="ccy-native">(${sym}${Number(native).toFixed(2)})</span>`,
                        Y.analysis(p.data.ticker));
      }
      return linkCell(main, Y.analysis(p.data.ticker));
    }},
  {field: "analyst_count", headerName: "Anlst", type: "numericColumn", flex: 0.7,
    cellRenderer: p => linkCell(fmtInt(p.value), Y.analysis(p.data.ticker))},
  {field: "forward_pe", headerName: "Fwd P/E", type: "numericColumn", flex: 1,
    cellRenderer: p => linkCell(fmt(p.value), Y.analysis(p.data.ticker)), sort: "asc"},
  {field: "last_crawl_at", headerName: "Last successful crawl", flex: 1.4,
    cellRenderer: p => fmtRelativeTime(p.value),
    cellClassRules: {
      "crawl-fresh": p => { const d = crawlAgeDays(p.value); return d != null && d <= 3; },
      "crawl-warn":  p => { const d = crawlAgeDays(p.value); return d != null && d >= 5 && d < 10; },
      "crawl-stale": p => { const d = crawlAgeDays(p.value); return d != null && d >= 10; },
    },
    tooltipValueGetter: p => p.value ? new Date(p.value).toLocaleString() : "no successful crawl yet"},
];

let gridPrefs;  // shared column visibility/width persistence (grid-prefs.js)

function updateHistoryPlaceholder() {
  const ph = document.getElementById("history-placeholder");
  if (ph) ph.style.display = visibleCharts.size === 0 ? "" : "none";
}

function destroyCharts(ticker) {
  const inst = chartInstances.get(ticker);
  if (!inst) return;
  inst.price?.destroy();
  inst.pe?.destroy();
  inst.vol?.destroy();
  chartInstances.delete(ticker);
}

function onSelectionChanged() {
  const selected = new Set(gridApi.getSelectedRows().map(r => r.ticker));
  let newlyAdded = null;
  for (const t of selected) {
    if (!visibleCharts.has(t)) {
      document.getElementById(`chart-card-${t}`).style.display = "";
      visibleCharts.add(t);
      newlyAdded = t;
    }
  }
  for (const t of [...visibleCharts]) {
    if (!selected.has(t)) {
      document.getElementById(`chart-card-${t}`).style.display = "none";
      destroyCharts(t);
      historyRows.delete(t);
      visibleCharts.delete(t);
    }
  }
  updateHistoryPlaceholder();
  // Adding/removing a ticker can widen or narrow the shared time axis, so re-render
  // every visible chart against the new extent, not just the one that changed.
  renderCharts().then(() => {
    if (!newlyAdded) return;
    requestAnimationFrame(() => {
      const card = document.getElementById(`chart-card-${newlyAdded}`);
      if (!card) return;
      card.scrollIntoView({behavior: "smooth", block: "start"});
      card.classList.remove("flash");
      void card.offsetWidth;
      card.classList.add("flash");
    });
  });
}

function ensureGrid() {
  if (gridApi) return;
  agGrid.ModuleRegistry.registerModules([agGrid.AllCommunityModule]);
  gridApi = agGrid.createGrid(document.getElementById("summary-grid"), {
    theme: agGrid.themeQuartz.withParams({
      rowHeight: 30, headerHeight: 34,
      fontFamily: "IBM Plex Mono, monospace", fontSize: 12,
      backgroundColor: "#0a0d11", foregroundColor: "#d7dde4",
      chromeBackgroundColor: "#13181e", headerBackgroundColor: "#13181e",
      headerTextColor: "#ff9e1b", borderColor: "#232a32",
      oddRowBackgroundColor: "#0c1014", rowHoverColor: "#13181e",
      accentColor: "#ff9e1b", browserColorScheme: "dark",
    }),
    columnDefs: COLUMN_DEFS,
    rowData: [],
    domLayout: "normal",
    defaultColDef: {resizable: true, sortable: true, filter: true},
    rowSelection: {
      mode: "multiRow",
      checkboxes: true,
      headerCheckbox: false,
      enableClickSelection: false,
    },
    getRowId: ({data}) => data.ticker,
    onSelectionChanged,
  });
  gridPrefs = GridPrefs.create({
    gridApi, columnDefs: COLUMN_DEFS, hiddenKey: "pe-hidden-cols",
    locked: ["ticker"],
    chooserBtn: document.getElementById("col-chooser-btn"),
    chooserMenu: document.getElementById("col-menu"),
  });
}

async function loadSnapshot() {
  const res = await fetch("{{ api_base }}/latest");
  const data = await res.json();
  ensureGrid();
  gridApi.setGridOption("rowData", data);
  const dates = data.map(r => r.date).filter(Boolean).sort();
  const latest = dates[dates.length - 1] || "no data yet";
  document.getElementById("meta").textContent = `· ${tickers.length} tickers · last updated ${latest}`;
}

let currentRange = "all";
let customStart = "";
let customEnd = "";

// Remember the selected period (preset range or custom window) across reloads.
const PERIOD_KEY = "pe-range";
function savePeriod() {
  localStorage.setItem(PERIOD_KEY, JSON.stringify({range: currentRange, start: customStart, end: customEnd}));
}
function restorePeriod() {
  let saved;
  try { saved = JSON.parse(localStorage.getItem(PERIOD_KEY)); } catch { saved = null; }
  if (!saved) return;
  if (saved.start || saved.end) {
    customStart = saved.start || "";
    customEnd = saved.end || "";
    const sd = document.getElementById("start-date"), ed = document.getElementById("end-date");
    if (sd) sd.value = customStart;
    if (ed) ed.value = customEnd;
    setActiveRangeBtn(null);
  } else if (saved.range && document.querySelector(`.range-btn[data-range="${saved.range}"]`)) {
    currentRange = saved.range;
    setActiveRangeBtn(saved.range);
  }
}

// The chart query is either a preset range or an explicit start/end window.
// Setting either date switches to custom mode; clicking a preset clears the dates.
function historyQuery() {
  if (customStart || customEnd) {
    const p = new URLSearchParams();
    if (customStart) p.set("start", customStart);
    if (customEnd) p.set("end", customEnd);
    return p.toString();
  }
  return `range=${currentRange}`;
}

function setActiveRangeBtn(range) {
  document.querySelectorAll(".range-btn").forEach(btn =>
    btn.classList.toggle("active", btn.dataset.range === range));
}

function setRange(range) {
  if (range === currentRange && !customStart && !customEnd) return;
  currentRange = range;
  customStart = customEnd = "";
  document.getElementById("start-date").value = "";
  document.getElementById("end-date").value = "";
  setActiveRangeBtn(range);
  savePeriod();
  historyRows.clear();
  renderCharts();
}

function onDateChange() {
  const s = document.getElementById("start-date").value;
  const e = document.getElementById("end-date").value;
  if (s && e && s > e) return;  // wait for a valid order before querying
  customStart = s;
  customEnd = e;
  setActiveRangeBtn(s || e ? null : currentRange);  // custom mode hides preset highlight
  savePeriod();
  historyRows.clear();
  renderCharts();
}

// Bumped on every render trigger; a fetch whose seq is stale is dropped so a
// slow earlier response can't populate the cache or render after a newer one.
let renderSeq = 0;
async function renderCharts() {
  const seq = ++renderSeq;
  await Promise.all([...visibleCharts].map(async t => {
    if (historyRows.has(t)) return;
    const res = await fetch(`{{ api_base }}/history/${t}?${historyQuery()}`);
    const rows = await res.json();
    if (seq !== renderSeq) return;   // superseded — drop stale response
    historyRows.set(t, rows);
  }));
  if (seq !== renderSeq) return;     // superseded — don't render stale data
  let [xMin, xMax] = timeExtent();
  if (xMin === xMax) { xMin -= 864e5; xMax += 864e5; }  // pad a single-point extent
  for (const t of visibleCharts) renderChart(t, xMin, xMax);
}

function renderChart(ticker, xMin, xMax) {
  const rows = historyRows.get(ticker) || [];
  const priceContainer = document.getElementById(`price-container-${ticker}`);
  const peContainer = document.getElementById(`container-${ticker}`);
  const volContainer = document.getElementById(`vol-container-${ticker}`);
  const latestEl = document.getElementById(`latest-${ticker}`);

  destroyCharts(ticker);

  if (!rows.length) {
    peContainer.innerHTML = '<div class="empty">No data yet — first snapshot will appear after the next crawl.</div>';
    priceContainer.innerHTML = "";
    volContainer.innerHTML = "";
    latestEl.textContent = "";
    return;
  }
  const last = rows[rows.length - 1];
  latestEl.textContent =
    `${last.name || ""} · ${fmtPrice(last.price, last.currency)} · ` +
    `TTM ${fmt(last.ttm_pe)} · Fwd ${fmt(last.forward_pe)} · ` +
    `Vol ${fmtVolume(last.volume)} · ${last.date}`;

  priceContainer.innerHTML = `<canvas id="chart-price-${ticker}"></canvas>`;
  peContainer.innerHTML = `<canvas id="chart-${ticker}"></canvas>`;
  volContainer.innerHTML = `<canvas id="chart-vol-${ticker}"></canvas>`;
  const priceCtx = document.getElementById(`chart-price-${ticker}`);
  const peCtx = document.getElementById(`chart-${ticker}`);
  const volCtx = document.getElementById(`chart-vol-${ticker}`);

  // Each line plots {x: epoch-ms, y} from this ticker's own rows; a null y is a
  // genuine gap (loss / undefined / pre-coverage) and spanGaps:false breaks it.
  // No union/alignment needed — Chart.js positions each point by its real date.
  const pts = field => rows.map(r => ({x: Date.parse(r.date), y: r[field] ?? null}));
  // Markers only on real anchors: interpolated rows get radius 0.
  const flagRadius = (flag, on) => rows.map(r => (r[flag] ? 0 : on));

  // Loss bands: contiguous spans where a line is undefined (no meaningful P/E),
  // tinted to match it. Sub-3-week gaps are dropped as interpolation noise.
  // TTM: a null P/E anywhere we have trailing EPS (the loss can reach the chart
  // edges). Forward/IBES: a null *between* real points — within coverage the
  // interpolated line only breaks on a forecast loss. Bands meet the real points.
  const MIN_BAND_MS = 20 * 864e5;
  const lossRuns = pred => {
    const out = []; let s = null;
    rows.forEach((r, i) => {
      if (pred(r, i)) { if (s === null) s = i; }
      else if (s !== null) { out.push([s, i - 1]); s = null; }
    });
    if (s !== null) out.push([s, rows.length - 1]);
    return out.map(([a, b]) => ({from: Date.parse(rows[Math.max(a - 1, 0)].date),
                                 to: Date.parse(rows[Math.min(b + 1, rows.length - 1)].date)}))
              .filter(b => b.to - b.from >= MIN_BAND_MS);
  };
  const lossOf = (coverField, gapField, inner) => {
    const cov = rows.map(r => r[coverField] != null);
    const lo = cov.indexOf(true), hi = cov.lastIndexOf(true), e = inner ? 1 : 0;
    return lo === -1 ? [] : lossRuns((r, i) => i >= lo + e && i <= hi - e && r[gapField] == null);
  };
  const tint = (runs, c) => runs.map(b => ({...b, color: c}));
  const lossBandList = [
    ...tint(lossOf("trailing_eps", "ttm_pe", false), "rgba(255,158,27,0.13)"),  // TTM loss
    ...tint(lossRuns(r => r.forward_pe_loss), "rgba(255,82,82,0.13)"),           // fwd loss
    ...tint(lossRuns(r => r.forward_pe_ibes_loss), "rgba(46,204,113,0.13)"),     // IBES loss
  ];

  const pinWidth = axis => { axis.width = Y_AXIS_WIDTH; };
  const lineStyle = {tension: 0.2, spanGaps: false, borderWidth: 1.5, pointRadius: 1.5, pointHoverRadius: 4};
  // offset:false on both charts (bar defaults to true) so a date maps to the same
  // pixel in the line and volume charts. pinX reserves the same right gutter on
  // both — the volume axis pads for its last date label, the label-less P/E axis
  // would otherwise run wider — so the bars line up under the lines.
  // Pad both x-axis ends equally so the labelled volume axis and the label-less
  // P/E axis share identical plot bounds (y-axis now sits on the right, so it no
  // longer pins the left edge for us).
  const pinX = s => { s.paddingLeft = 36; s.paddingRight = 36; };
  const xAxis = extra => ({type: "linear", offset: false, min: xMin, max: xMax,
                           afterFit: pinX, ...extra});
  const dateTitle = items => (items.length ? fmtDateAxis(items[0].parsed.x) : "");

  // Price rides the same pinned date axis above P/E (P/E = price/EPS, so price
  // diverging from TTM P/E flags an EPS revision). Log y: equal % == equal height.
  const fmtPriceAxis = v => v.toLocaleString("en-US", {maximumFractionDigits: v >= 100 ? 0 : 2});
  const priceChart = new Chart(priceCtx, {
    type: "line",
    data: {
      datasets: [{label: "Price", data: pts("price"), borderColor: "#3bc9ff", backgroundColor: "#3bc9ff", ...lineStyle}],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: {mode: "index", intersect: false},
      scales: {
        y: {type: "logarithmic", position: "right", afterFit: pinWidth, ticks: {callback: fmtPriceAxis, maxTicksLimit: 4}},
        x: xAxis({ticks: {display: false}, grid: {display: false}}),
      },
      plugins: {
        legend: {display: false},
        tooltip: {callbacks: {title: dateTitle, label: c => `Price: ${fmtPrice(c.parsed.y, last.currency)}`}},
        cutoffLine: {date: FIRST_LIVE_DATE},
      },
    },
  });

  const peChart = new Chart(peCtx, {
    type: "line",
    data: {
      datasets: [
        {label: "TTM P/E", data: pts("ttm_pe"), borderColor: "#ff9e1b", backgroundColor: "#ff9e1b", hidden: hiddenSeries.has("TTM P/E"), ...lineStyle},
        {label: "Forward P/E", data: pts("forward_pe"), borderColor: "#ff5252", backgroundColor: "#ff5252", hidden: hiddenSeries.has("Forward P/E"), ...lineStyle,
         pointRadius: flagRadius("forward_pe_interpolated", 1.5), pointHoverRadius: flagRadius("forward_pe_interpolated", 4)},
        {label: "Forward P/E (IBES)", data: pts("forward_pe_ibes"), borderColor: "#2ecc71", backgroundColor: "#2ecc71", hidden: hiddenSeries.has("Forward P/E (IBES)"), ...lineStyle,
         borderDash: [5, 3], pointRadius: flagRadius("forward_pe_ibes_interpolated", 2), pointHoverRadius: flagRadius("forward_pe_ibes_interpolated", 4)},
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: {mode: "index", intersect: false},
      scales: {
        y: {beginAtZero: false, position: "right", afterFit: pinWidth},
        x: xAxis({ticks: {display: false}, grid: {display: false}}),
      },
      plugins: {
        legend: {display: false},   // replaced by the shared #series-legend
        lossBands: {bands: lossBandList},
        tooltip: {callbacks: {title: dateTitle}},
        cutoffLine: {date: FIRST_LIVE_DATE},
      },
    },
  });

  const volChart = new Chart(volCtx, {
    type: "bar",
    data: {
      datasets: [{
        label: "Volume",
        data: pts("volume"),
        backgroundColor: "rgba(110, 120, 134, 0.5)",
        borderWidth: 0,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: {mode: "index", intersect: false},
      plugins: {
        legend: {display: false},
        tooltip: {callbacks: {title: dateTitle, label: c => `Volume: ${fmtVolume(c.parsed.y)}`}},
        cutoffLine: {date: FIRST_LIVE_DATE},
      },
      scales: {
        y: {
          beginAtZero: true,
          position: "right",
          afterFit: pinWidth,
          ticks: {callback: fmtVolumeAxis, maxTicksLimit: 3},
        },
        x: xAxis({ticks: {callback: fmtDateTick, maxRotation: 0, autoSkip: false}, grid: {display: false},
                  afterBuildTicks: s => { s.ticks = niceDateTicks(s.min, s.max); }}),
      },
    },
  });

  chartInstances.set(ticker, {price: priceChart, pe: peChart, vol: volChart});
}

async function refresh() {
  const btn = document.getElementById("refresh-btn");
  btn.disabled = true;
  btn.textContent = "Fetching…";
  try {
    await fetch("{{ api_base }}/refresh", {method: "POST"});
    await loadSnapshot();
    historyRows.clear();
    await renderCharts();
  } finally {
    btn.disabled = false;
    btn.textContent = "Refresh now";
  }
}

// Draggable divider between the snapshot grid (left) and charts (right).
// Adjusts --split (left-panel fraction of the row) and persists it, so the
// layout can be tuned to the monitor. Only active in the ≥1280px two-column
// layout; below that the panels stack and the gutter is hidden.
const SPLIT_KEY = "pe-panel-split";
const MIN_SPLIT = 0.2, MAX_SPLIT = 0.8;

function reflowCharts() {
  for (const inst of chartInstances.values()) { inst.price?.resize(); inst.pe?.resize(); inst.vol?.resize(); }
}

function setSplit(frac, persist) {
  frac = Math.min(MAX_SPLIT, Math.max(MIN_SPLIT, frac));
  document.documentElement.style.setProperty("--split", frac);
  if (persist) localStorage.setItem(SPLIT_KEY, String(frac));
  return frac;
}

function initPanelSplitter() {
  const gutter = document.getElementById("panel-gutter");
  const dash = document.querySelector(".dashboard");
  if (!gutter || !dash) return;

  const saved = parseFloat(localStorage.getItem(SPLIT_KEY));
  if (!Number.isNaN(saved)) setSplit(saved, false);

  let dragging = false;
  const onMove = e => {
    if (!dragging) return;
    const rect = dash.getBoundingClientRect();
    const usable = rect.width - gutter.offsetWidth;
    if (usable > 0) setSplit((e.clientX - rect.left) / usable, false);
  };
  const onUp = () => {
    if (!dragging) return;
    dragging = false;
    gutter.classList.remove("dragging");
    document.body.style.userSelect = "";
    const frac = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--split"));
    localStorage.setItem(SPLIT_KEY, String(frac));
    reflowCharts();
    window.removeEventListener("pointermove", onMove);
    window.removeEventListener("pointerup", onUp);
  };
  gutter.addEventListener("pointerdown", e => {
    dragging = true;
    gutter.classList.add("dragging");
    document.body.style.userSelect = "none";  // don't select text mid-drag
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
    e.preventDefault();
  });
  gutter.addEventListener("dblclick", () => { setSplit(0.5, true); reflowCharts(); });
}

(async () => {
  document.querySelectorAll(".range-btn").forEach(btn => {
    btn.addEventListener("click", () => setRange(btn.dataset.range));
  });
  // Local Y-M-D, not toISOString() (UTC) — else "today" is unavailable during
  // early local hours in positive-offset zones.
  const now = new Date();
  const pad = n => String(n).padStart(2, "0");
  const today = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}`;
  for (const id of ["start-date", "end-date"]) {
    const el = document.getElementById(id);
    el.max = today;
    el.addEventListener("change", onDateChange);
  }
  restorePeriod();
  renderSeriesLegend();
  renderPanelToggle();
  applyPanelVisibility();
  initPanelSplitter();
  updateHistoryPlaceholder();
  await loadSnapshot();
  // Re-fetch so a background crawl shows up without manual refresh; re-render
  // more often so the crawl age ticks smoothly between fetches.
  setInterval(() => loadSnapshot().catch(() => {}), 300000);
  setInterval(() => gridApi?.refreshCells({columns: ["last_crawl_at"], force: true}), 30000);
})();
</script>
