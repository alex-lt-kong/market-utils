<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pyramiding Calculator</title>
<meta name="theme-color" content="#000000">
<link rel="stylesheet" href="/static/terminal.css">
<style>
.term { max-width: 620px; }
form { margin: 0; }
.field {
  display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 10px;
  padding: 7px 0; border-bottom: 1px solid var(--border);
}
.field:last-child { border-bottom: none; }
.field label { color: var(--muted); text-transform: uppercase; letter-spacing: .06em; font-size: 11px; }
.field input { width: 190px; text-align: right; }
.cur { margin: 12px 2px; color: var(--muted); font-variant-numeric: tabular-nums; }
#out { margin-top: 12px; }
td.k { color: var(--muted); }
td.v { text-align: right; font-weight: 700; }
tr.hl td { background: var(--panel-2); color: var(--amber); }
.note { color: var(--muted); font-size: 11px; margin: 10px 2px 0; line-height: 1.6; }
.lede { color: var(--muted); margin: 2px 2px 12px; }
</style>
</head>
<body>
<div class="term">
  <header class="term-header">
    <div class="brand">🗻 PYRAMIDING CALCULATOR</div>
    <a class="nav-link" href="/">← Terminal</a>
  </header>

  <div class="term-subbar">Position &rarr; Target P/L%</div>
  <p class="lede">How many more shares to add at market so your P/L% moves to a target.</p>

  <form id="f" class="panel" autocomplete="off">
    <div class="field"><label for="qty">Quantity held</label><input id="qty" type="number" step="any" inputmode="decimal" placeholder="100"></div>
    <div class="field"><label for="avg">Average cost</label><input id="avg" type="number" step="any" inputmode="decimal" placeholder="100"></div>
    <div class="field"><label for="px">Market price</label><input id="px" type="number" step="any" inputmode="decimal" placeholder="120"></div>
    <div class="field"><label for="tgt">Target P/L %</label><input id="tgt" type="number" step="any" inputmode="decimal" placeholder="15"></div>
  </form>

  <div class="cur" id="cur"></div>
  <div id="out"></div>
</div>

<footer class="term-status">
  <span class="k">FN</span> <span class="muted">PYRAMIDING-CALC</span>
  <span class="spacer"></span>
  <span class="muted">GAMBLER'S TERMINAL</span>
</footer>

<script>
const $ = id => document.getElementById(id);
const num = id => { const v = parseFloat($(id).value); return Number.isFinite(v) ? v : null; };
const money = n => n.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
const pct = n => (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
const cls = n => n >= 0 ? 'up' : 'down';

// All math lives server-side in modules/averaging_calc/calc.py; the page just
// asks /api/calc and renders. No formula here, so nothing can drift.
const shares = n => n.toLocaleString(undefined, {maximumFractionDigits: 4});

function show(d) {
  const cur = $('cur'), out = $('out');
  cur.innerHTML = `Current: <b class="${cls(d.current_pnl_pct)}">${pct(d.current_pnl_pct)}</b> &middot; ` +
    `P/L <b class="${cls(d.pnl_amount)}">${money(d.pnl_amount)}</b>`;
  if (d.target_pct === null || d.target_pct === undefined) { out.innerHTML = ''; return; }
  if (!d.reachable) {
    out.innerHTML = `<p class="err">Target must be strictly between ${pct(d.reachable_low_pct)} and ` +
      `${pct(d.reachable_high_pct)}. Buying more shares can only pull your P/L% toward 0% — never to 0, ` +
      `past it, or beyond your current level.</p>`;
    return;
  }
  const p = d.plan;
  out.innerHTML =
    `<table>
      <tr class="hl"><td class="k">Shares to buy</td><td class="v">${shares(p.shares_to_buy)}</td></tr>
      <tr><td class="k">Capital required</td><td class="v">${money(p.capital_required)}</td></tr>
      <tr><td class="k">New average cost</td><td class="v">${money(p.new_avg_cost)}</td></tr>
      <tr><td class="k">New quantity</td><td class="v">${shares(p.new_qty)}</td></tr>
      <tr><td class="k">Resulting P/L%</td><td class="v ${cls(p.new_pnl_pct)}">${pct(p.new_pnl_pct)}</td></tr>
    </table>
    <p class="note">Whole shares: buy <b>${p.shares_to_buy_whole.toLocaleString()}</b> &rarr; ` +
    `P/L <b>${pct(p.whole_new_pnl_pct)}</b>. Dollar P/L stays ` +
    `<b class="${cls(d.pnl_amount)}">${money(d.pnl_amount)}</b> — buying at market adds no gain or loss; ` +
    `only the % changes.</p>`;
}

let seq = 0, timer;
async function run() {
  const qty = num('qty'), avg = num('avg'), px = num('px'), tgt = num('tgt');
  if (qty === null || avg === null || px === null) { $('cur').innerHTML = ''; $('out').innerHTML = ''; return; }
  const u = new URL('api/calc', document.baseURI);
  u.searchParams.set('qty', qty); u.searchParams.set('avg_cost', avg); u.searchParams.set('mkt_px', px);
  if (tgt !== null) u.searchParams.set('target_pct', tgt);
  const my = ++seq;
  try {
    const r = await fetch(u);
    if (my !== seq) return;  // a newer edit superseded this request
    if (!r.ok) {
      const e = await r.json().catch(() => ({}));
      $('cur').innerHTML = ''; $('out').innerHTML = `<p class="err">${e.detail || ('Error ' + r.status)}</p>`;
      return;
    }
    show(await r.json());
  } catch (_) {
    if (my === seq) $('out').innerHTML = '<p class="err">Network error — is the server reachable?</p>';
  }
}

$('f').addEventListener('input', () => { clearTimeout(timer); timer = setTimeout(run, 150); });
</script>
</body>
</html>
